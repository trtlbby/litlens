version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: litlens-db
    environment:
      POSTGRES_USER: litlens
      POSTGRES_PASSWORD: litlens_password
      POSTGRES_DB: litlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: litlens-python
    ports:
      - "8000:8000"
    volumes:
      - ./python-service:/app
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
